<!doctype html>

  <head>
    <!-- Google Consent Mode defaults must run before Google Tag Manager loads. -->
    <script>
      window.dataLayer = window.dataLayer || []
      function gtag() {
        dataLayer.push(arguments)
      }

      ;(function () {
        var storedConsent = null
        try {
          storedConsent = JSON.parse(localStorage.getItem('pfa_cookie_consent_v1') || 'null')
        } catch (_error) {
          storedConsent = null
        }

        var hasStoredConsent = storedConsent && typeof storedConsent.analytics === 'boolean'
        var analyticsGranted = hasStoredConsent ? storedConsent.analytics === true : true
        var consentRequiredRegions = [
          'AT',
          'BE',
          'BG',
          'CH',
          'CY',
          'CZ',
          'DE',
          'DK',
          'EE',
          'ES',
          'FI',
          'FR',
          'GB',
          'GR',
          'HR',
          'HU',
          'IE',
          'IS',
          'IT',
          'LI',
          'LT',
          'LU',
          'LV',
          'MT',
          'NL',
          'NO',
          'PL',
          'PT',
          'RO',
          'SE',
          'SI',
          'SK',
        ]

        gtag('consent', 'default', {
          ad_storage: 'denied',
          ad_user_data: 'denied',
          ad_personalization: 'denied',
          analytics_storage: analyticsGranted ? 'granted' : 'denied',
          functionality_storage: 'granted',
          personalization_storage: 'denied',
          security_storage: 'granted',
          wait_for_update: 500,
        })

        if (!hasStoredConsent) {
          gtag('consent', 'default', {
            analytics_storage: 'denied',
            region: consentRequiredRegions,
          })
        }
      })()
    </script>
    <!-- Google Tag Manager -->
    <script>
      ;(function (w, d, s, l, i) {
        w[l] = w[l] || []

        var f = d.getElementsByTagName(s)[0],
          j = d.createElement(s),
          dl = l != 'dataLayer' ? '&l=' + l : ''
        j.async = true
        j.src = 'https://www.googletagmanager.com/gtm.js?id=' + i + dl
        f.parentNode.insertBefore(j, f)
      })(window, document, 'script', 'dataLayer', 'GTM-KPMZHMSG')
    </script>
